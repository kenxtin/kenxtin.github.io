<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Flipbook Local</title>

    <link href="dflip/css/dflip.min.css" rel="stylesheet">
    <link href="dflip/css/themify-icons.min.css" rel="stylesheet">

    <style>
        body { margin: 0; padding: 20px; }
        #flipbookContainer { width: 100%; height: 600px; }
    </style>
</head>
<body>

    
    <div id="flipbookContainer"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="dflip/js/dflip.min.js"></script>

    <script>
        $(document).ready(function() {
            var options = {
                height: 1000,
                duration: 700
            };

            // Chargement du fichier PDF local
            var pdfUrl = "document.pdf";
            var flipBook = $("#flipbookContainer").flipBook(pdfUrl, options);
        });
    </script>
</body>
</html>
